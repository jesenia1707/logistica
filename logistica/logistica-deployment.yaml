apiVersion: apps/v1
kind: Deployment

metadata:
  name: logistica

spec:
  replicas: 3

  selector:
    matchLabels:
      app: logistica

  template:
    metadata:
      labels:
        app: logistica

    spec:
      containers:
      - name: logistica
        image: logistica-service:latest

        ports:
        - containerPort: 8083

        env:
        - name: SPRING_RABBITMQ_HOST
          value: rabbitmq-service